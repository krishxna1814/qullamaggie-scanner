name: Breakout Scanner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan period'
        required: true
        default: '6mo'
        type: choice
        options:
          - 1mo
          - 3mo
          - 6mo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python main.py --scan-${{ github.event.inputs.mode }}

      - name: Commit results
        run: |
          git config user.name "Scanner Bot"
          git config user.email "scanner@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Scan results $(date +'%Y-%m-%d')"
          git push origin main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-logs
          path: |
            results/
            *.log
