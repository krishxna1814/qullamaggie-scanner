name: Breakout Scanner

on:
  schedule:
    # EOD Scan: Mon-Fri 4:30 PM EST (21:30 UTC)
    - cron: '30 21 * * 1-5'
    # Weekly Deep: Sunday 8 PM EST (Mon 01:00 UTC)
    - cron: '0 1 * * 0'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - weekly

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine scan mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=scan" >> $GITHUB_OUTPUT
          fi

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python main.py --${{ steps.mode.outputs.mode }}

      - name: Commit results
        run: |
          git config user.name "Scanner Bot"
          git config user.email "scanner@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Scan results $(date +'%Y-%m-%d')"
          git push origin main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-logs
          path: |
            results/
            *.log
